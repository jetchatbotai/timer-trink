workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Verify required project files
        script: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html
          test -f www/app.js
          test -f native-android/java/com/timertrink/app/AlarmBridgePlugin.java
          test -f native-android/java/com/timertrink/app/AlarmReceiver.java
          test -f native-android/java/com/timertrink/app/AlarmSoundService.java
          test -f native-android/java/com/timertrink/app/AlarmStopReceiver.java

      - name: Recreate Android platform
        script: |
          rm -rf android
          npx cap add android

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Create native folders
        script: |
          mkdir -p android/app/src/main/java/com/timertrink/app
          mkdir -p android/app/src/main/res/raw

      - name: Copy native Java files
        script: |
          cp native-android/java/com/timertrink/app/AlarmBridgePlugin.java android/app/src/main/java/com/timertrink/app/AlarmBridgePlugin.java
          cp native-android/java/com/timertrink/app/AlarmReceiver.java android/app/src/main/java/com/timertrink/app/AlarmReceiver.java
          cp native-android/java/com/timertrink/app/AlarmSoundService.java android/app/src/main/java/com/timertrink/app/AlarmSoundService.java
          cp native-android/java/com/timertrink/app/AlarmStopReceiver.java android/app/src/main/java/com/timertrink/app/AlarmStopReceiver.java

      - name: Create MainActivity
        script: |
          cat > android/app/src/main/java/com/timertrink/app/MainActivity.java <<'EOF'
          package com.timertrink.app;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(AlarmBridgePlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

      - name: Write AndroidManifest
        script: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.timertrink.app">

              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.VIBRATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name="com.timertrink.app.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:theme="@style/AppTheme.NoActionBarLaunch">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <receiver
                      android:name="com.timertrink.app.AlarmReceiver"
                      android:enabled="true"
                      android:exported="false" />

                  <receiver
                      android:name="com.timertrink.app.AlarmStopReceiver"
                      android:enabled="true"
                      android:exported="false" />

                  <service
                      android:name="com.timertrink.app.AlarmSoundService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaPlayback" />
              </application>

          </manifest>
          EOF

      - name: Copy raw sounds
        script: |
          cp www/beep.mp3 android/app/src/main/res/raw/beep.mp3 || true
          cp www/beep.wav android/app/src/main/res/raw/beep.wav || true

          for i in $(seq 1 20); do
            if [ -f "www/sound${i}.mp3" ]; then
              cp "www/sound${i}.mp3" "android/app/src/main/res/raw/sound${i}.mp3"
            fi
            if [ -f "www/sound${i}.wav" ]; then
              cp "www/sound${i}.wav" "android/app/src/main/res/raw/sound${i}.wav"
            fi
          done

      - name: Fix Gradle Java compatibility
        script: |
          sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' android/app/build.gradle || true
          sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' android/app/build.gradle || true
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/build.gradle || true

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

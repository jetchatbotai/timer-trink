workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Recreate Android platform
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Copy AlarmActivity
        script: |
          mkdir -p android/app/src/main/java/com/timertrink/app
          cp native-android/java/com/timertrink/app/AlarmActivity.java android/app/src/main/java/com/timertrink/app/AlarmActivity.java

      - name: Patch AndroidManifest
        script: |
          python3 - << 'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          permissions = [
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.VIBRATE" />'
          ]

          for perm in permissions:
              if perm not in text:
                  text = text.replace("<application", perm + "\n\n    <application", 1)

          activity_block = '''
                  <activity
                      android:name=".AlarmActivity"
                      android:exported="true"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true"
                      android:excludeFromRecents="true"
                      android:launchMode="singleTop" />
          '''

          if 'android:name=".AlarmActivity"' not in text:
              text = text.replace("</application>", activity_block + "\n    </application>", 1)

          manifest.write_text(text, encoding="utf-8")
          print("patched")
          PY

      - name: Copy sounds to raw
        script: |
          mkdir -p android/app/src/main/res/raw

          for i in $(seq 1 20); do
            if [ -f "www/sound${i}.mp3" ]; then
              cp "www/sound${i}.mp3" "android/app/src/main/res/raw/sound${i}.mp3"
            fi
          done

          if [ -f "www/beep.mp3" ]; then
            cp "www/beep.mp3" "android/app/src/main/res/raw/beep.mp3"
          fi

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

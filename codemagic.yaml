workflows:
  android-release:
    name: Android Release
    max_build_duration: 60

    environment:
      node: 20
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Check web files
        script: |
          echo "Checking web assets..."
          ls -la
          ls -la www
          test -f www/index.html
          test -f www/app.js

      - name: Add Android platform if missing
        script: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Build Android release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build Android release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

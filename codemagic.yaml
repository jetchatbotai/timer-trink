workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Create Android platform
        script: |
          npx cap add android

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

workflows:
  timer_trink_release:
    name: Timer Trink Release AAB
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp styles.css www/
          cp app.js www/

      - name: Add Android platform
        script: |
          npx cap add android || true

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Fix SDK + Version
        script: |
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/compileSdkVersion [0-9]\\+/compileSdkVersion 35/g' $APP_GRADLE || true
          sed -i 's/targetSdkVersion [0-9]\\+/targetSdkVersion 35/g' $APP_GRADLE || true
          sed -i 's/versionCode [0-9]\\+/versionCode 1/g' $APP_GRADLE || true
          sed -i 's/versionName \".*\"/versionName \"1.0.0\"/g' $APP_GRADLE || true

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

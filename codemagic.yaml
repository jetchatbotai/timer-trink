workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Verify project files
        script: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html
          test -f www/app.js
          test -f www/styles.css

      - name: Recreate Android platform
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Patch AndroidManifest
        script: |
          python3 - << 'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          permissions = [
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.USE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.VIBRATE" />'
          ]

          for perm in permissions:
              if perm not in text:
                  text = text.replace("<application", perm + "\n\n    <application", 1)

          manifest.write_text(text, encoding="utf-8")
          print("patched manifest")
          PY

      - name: Copy sounds to raw
        script: |
          mkdir -p android/app/src/main/res/raw

          for i in $(seq 1 20); do
            if [ -f "www/sound${i}.wav" ]; then
              cp "www/sound${i}.wav" "android/app/src/main/res/raw/sound${i}.wav"
            fi
            if [ -f "www/sound${i}.mp3" ]; then
              cp "www/sound${i}.mp3" "android/app/src/main/res/raw/sound${i}.mp3"
            fi
          done

          if [ -f "www/beep.wav" ]; then
            cp "www/beep.wav" "android/app/src/main/res/raw/beep.wav"
          fi

          if [ -f "www/beep.mp3" ]; then
            cp "www/beep.mp3" "android/app/src/main/res/raw/beep.mp3"
          fi

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

workflows:
  timer_trink_android_release:
    name: Timer Trink Android Release AAB
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prepare web assets
        script: |
          rm -rf www
          mkdir -p www
          cp index.html www/
          cp styles.css www/
          cp app.js www/

      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Build Android release bundle
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

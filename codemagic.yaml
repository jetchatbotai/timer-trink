workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Verify project files
        script: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html
          test -f www/app.js
          test -f www/styles.css
          ls -la www || true

      - name: Recreate Android platform
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Patch AndroidManifest
        script: |
          python3 - << 'PY'
          from pathlib import Path

          manifest_path = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest_path.read_text(encoding="utf-8")

          permissions = [
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />',
              '<uses-permission android:name="android.permission.USE_EXACT_ALARM" />',
              '<uses-permission android:name="android.permission.WAKE_LOCK" />',
              '<uses-permission android:name="android.permission.VIBRATE" />',
              '<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />'
          ]

          for perm in permissions:
              if perm not in text:
                  text = text.replace("<application", perm + "\n\n    <application", 1)

          manifest_path.write_text(text, encoding="utf-8")
          print("AndroidManifest patched.")
          PY

      - name: Copy sounds to Android raw
        script: |
          mkdir -p android/app/src/main/res/raw

          found_any=false

          for i in $(seq 1 20); do
            if [ -f "www/sound${i}.wav" ]; then
              cp "www/sound${i}.wav" "android/app/src/main/res/raw/sound${i}.wav"
              found_any=true
            elif [ -f "www/sound${i}.mp3" ]; then
              cp "www/sound${i}.mp3" "android/app/src/main/res/raw/sound${i}.mp3"
              found_any=true
            fi
          done

          if [ -f "www/beep.wav" ]; then
            cp "www/beep.wav" "android/app/src/main/res/raw/beep.wav"
          elif [ -f "www/beep.mp3" ]; then
            cp "www/beep.mp3" "android/app/src/main/res/raw/beep.mp3"
          fi

          echo "RAW FILES:"
          ls -la android/app/src/main/res/raw || true

          if [ "$found_any" = false ]; then
            echo "ERROR: No sound files found in www/"
            exit 1
          fi

      - name: Verify Android files
        script: |
          test -f android/gradlew
          test -f android/app/src/main/AndroidManifest.xml
          ls -la android/app/src/main/res/raw || true

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

workflows:
  android-workflow:
    name: Android Debug APK (FULL ALARM FIX)
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Verify project files
        script: |
          test -f package.json
          test -f capacitor.config.json
          test -f www/index.html
          test -f www/app.js
          test -f www/styles.css

      - name: Recreate Android platform
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android

      # 🔥 EN KRİTİK KISIM
      - name: Patch AndroidManifest (FULL POWER)
        script: |
          python3 - << 'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          permissions = [
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.SCHEDULE_EXACT_ALARM',
              'android.permission.WAKE_LOCK',
              'android.permission.VIBRATE',
              'android.permission.RECEIVE_BOOT_COMPLETED',
              'android.permission.FOREGROUND_SERVICE'
          ]

          for p in permissions:
              if p not in text:
                  text = text.replace("<application", f'<uses-permission android:name="{p}" />\n\n    <application', 1)

          # 🔥 heads-up ve kilit ekran için
          if 'android:showWhenLocked' not in text:
              text = text.replace(
                  "<activity",
                  '<activity android:showWhenLocked="true" android:turnScreenOn="true"',
                  1
              )

          manifest.write_text(text)
          print("MANIFEST FULL PATCHED")
          PY

      # 🔥 SES DOSYALARI
      - name: Copy sounds to Android raw
        script: |
          mkdir -p android/app/src/main/res/raw

          for i in $(seq 1 20); do
            if [ -f "www/sound${i}.wav" ]; then
              cp "www/sound${i}.wav" "android/app/src/main/res/raw/sound${i}.wav"
            elif [ -f "www/sound${i}.mp3" ]; then
              cp "www/sound${i}.mp3" "android/app/src/main/res/raw/sound${i}.mp3"
            fi
          done

          if [ -f "www/beep.wav" ]; then
            cp "www/beep.wav" "android/app/src/main/res/raw/beep.wav"
          elif [ -f "www/beep.mp3" ]; then
            cp "www/beep.mp3" "android/app/src/main/res/raw/beep.mp3"
          fi

          ls -la android/app/src/main/res/raw

      # 🔥 CHANNEL FIX (ASIL SORUN BURDAYDI)
      - name: Force Notification Channel Config
        script: |
          mkdir -p android/app/src/main/java/com/getcapacitor

          cat <<EOF > android/app/src/main/java/com/getcapacitor/NotificationFix.java
          package com.getcapacitor;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.os.Build;

          public class NotificationFix {
              public static void create(Context context) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationManager nm = context.getSystemService(NotificationManager.class);

                      NotificationChannel channel = new NotificationChannel(
                          "timer_alerts_v6_s1",
                          "Timer Alarm",
                          NotificationManager.IMPORTANCE_HIGH
                      );

                      channel.enableVibration(true);
                      channel.setLockscreenVisibility(1);
                      channel.setSound(null, null); // JS yönetecek

                      nm.createNotificationChannel(channel);
                  }
              }
          }
          EOF

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle

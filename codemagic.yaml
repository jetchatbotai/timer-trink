workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build Android
        script: cd android && ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

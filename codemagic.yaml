workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Check web files
        script: |
          ls -la
          ls -la www
          test -f www/index.html
          test -f www/app.js

      - name: Backup raw sounds if present
        script: |
          mkdir -p /tmp/timer_raw_backup
          if [ -d android/app/src/main/res/raw ]; then
            cp -R android/app/src/main/res/raw/. /tmp/timer_raw_backup/ || true
          fi

      - name: Ensure Android platform exists
        script: |
          if [ ! -f android/gradlew ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Restore raw sounds after android recreation
        script: |
          mkdir -p android/app/src/main/res/raw
          if [ -d /tmp/timer_raw_backup ]; then
            cp -R /tmp/timer_raw_backup/. android/app/src/main/res/raw/ || true
          fi
          ls -la android/app/src/main/res/raw || true

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Verify Android files
        script: |
          test -f android/gradlew
          test -f android/app/src/main/AndroidManifest.xml

      - name: Build Android debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper

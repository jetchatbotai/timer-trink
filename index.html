<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Trink!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="card">
      <div class="topbar">
        <h1>⏱ Timer Trink!</h1>

        <div class="top-actions">
          <select id="language" aria-label="Language">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
            <option value="ru">Русский</option>
          </select>

          <button id="themeToggle" class="icon-btn" type="button">🌙</button>
        </div>
      </div>

      <p id="subtitle" class="subtitle">Basit, hızlı ve çok dilli zamanlayıcı</p>

      <div class="nav-tabs">
        <button class="tab-btn active" data-tab="timerTab" id="tabTimer">Timer</button>
        <button class="tab-btn" data-tab="soundsTab" id="tabSounds">Sesler</button>
        <button class="tab-btn" data-tab="settingsTab" id="tabSettings">Ayarlar</button>
      </div>

      <!-- TIMER TAB -->
      <section id="timerTab" class="tab-content active">
        <div class="timer-ring">
          <div class="ring"></div>
          <div id="display" class="display">00:00:00</div>
        </div>

        <div class="quick-times">
          <button class="quick-btn" data-hours="0" data-minutes="1" data-seconds="0">1m</button>
          <button class="quick-btn" data-hours="0" data-minutes="5" data-seconds="0">5m</button>
          <button class="quick-btn" data-hours="0" data-minutes="10" data-seconds="0">10m</button>
          <button class="quick-btn" data-hours="0" data-minutes="25" data-seconds="0">25m</button>
        </div>

        <div class="time-inputs">
          <div class="time-box">
            <label id="hoursLabel" for="hours">Saat</label>
            <input type="number" id="hours" min="0" step="1" value="0" />
          </div>

          <div class="time-box">
            <label id="minutesLabel" for="minutes">Dakika</label>
            <input type="number" id="minutes" min="0" step="1" value="0" />
          </div>

          <div class="time-box">
            <label id="secondsLabel" for="seconds">Saniye</label>
            <input type="number" id="seconds" min="0" step="1" value="0" />
          </div>
        </div>

        <div class="buttons">
          <button id="startBtn" class="primary" type="button">Başlat</button>
          <button id="pauseBtn" type="button">Duraklat</button>
          <button id="resetBtn" type="button">Sıfırla</button>
        </div>

        <div class="options">
          <label class="switch-row">
            <input type="checkbox" id="soundToggle" checked />
            <span id="soundLabel">Ses açık</span>
          </label>

          <label class="switch-row">
            <input type="checkbox" id="vibrationToggle" checked />
            <span id="vibrationLabel">Titreşim açık</span>
          </label>
        </div>

        <div id="status" class="status"></div>
      </section>

      <!-- SOUNDS TAB -->
      <section id="soundsTab" class="tab-content">
        <h2 id="soundsTitle" class="section-title">Alarm Sesleri</h2>
        <p id="soundsDesc" class="section-desc">Bir ses seç ve önizleme yap.</p>

        <div class="sound-list">
          <label class="sound-item">
            <input type="radio" name="alarmSound" value="classic" checked />
            <span>Classic Bell</span>
          </label>

          <label class="sound-item">
            <input type="radio" name="alarmSound" value="digital" />
            <span>Digital Beep</span>
          </label>

          <label class="sound-item">
            <input type="radio" name="alarmSound" value="soft" />
            <span>Soft Tone</span>
          </label>

          <label class="sound-item">
            <input type="radio" name="alarmSound" value="urgent" />
            <span>Urgent Alarm</span>
          </label>
        </div>

        <button id="previewSoundBtn" class="wide-btn" type="button">Sesi Dinle</button>
      </section>

      <!-- SETTINGS TAB -->
      <section id="settingsTab" class="tab-content">
        <h2 id="settingsTitle" class="section-title">Ayarlar</h2>
        <p id="settingsDesc" class="section-desc">Genel uygulama seçenekleri</p>

        <div class="settings-grid">
          <div class="settings-card">
            <h3 id="themeTitle">Tema</h3>
            <p id="themeDesc">Koyu veya açık görünüm</p>
          </div>

          <div class="settings-card">
            <h3 id="langTitle">Dil</h3>
            <p id="langDesc">Arayüz dilini değiştir</p>
          </div>

          <div class="settings-card">
            <h3 id="aboutTitle">Hakkında</h3>
            <p id="aboutDesc">Timer Trink! çok dilli akıllı zamanlayıcıdır.</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Trink!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 class="brand">⏱ Timer Trink!</h1>
        <p id="subtitle" class="subtitle">Simple timer for focus and daily use</p>
      </div>

      <div class="top-actions">
        <select id="language">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
          <option value="it">Italiano</option>
          <option value="pt">Português</option>
          <option value="zh">中文</option>
        </select>
        <button id="themeToggle" class="icon-btn" type="button">🌙</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="timerPanel" id="tabTimer">Timer</button>
      <button class="tab-btn" data-tab="pomodoroPanel" id="tabPomodoro">Pomodoro</button>
      <button class="tab-btn" data-tab="stopwatchPanel" id="tabStopwatch">Stopwatch</button>
      <button class="tab-btn" data-tab="soundsPanel" id="tabSounds">Sounds</button>
    </nav>

    <section id="timerPanel" class="panel active">
      <div class="display-wrap">
        <div id="timerRing" class="ring"></div>
        <div id="timerDisplay" class="display">00:00:00</div>
      </div>

      <div class="quick-row">
        <button class="chip quick-btn" data-h="0" data-m="1" data-s="0" type="button">1m</button>
        <button class="chip quick-btn" data-h="0" data-m="5" data-s="0" type="button">5m</button>
        <button class="chip quick-btn" data-h="0" data-m="10" data-s="0" type="button">10m</button>
        <button class="chip quick-btn" data-h="0" data-m="25" data-s="0" type="button">25m</button>
      </div>

      <div class="inputs-grid">
        <div class="field">
          <label id="hoursLabel" for="hours">Hours</label>
          <input id="hours" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label id="minutesLabel" for="minutes">Minutes</label>
          <input id="minutes" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label id="secondsLabel" for="seconds">Seconds</label>
          <input id="seconds" type="number" min="0" value="0" />
        </div>
      </div>

      <div class="controls">
        <button id="timerStartBtn" class="primary" type="button">Start</button>
        <button id="timerPauseBtn" type="button">Pause</button>
        <button id="timerResetBtn" type="button">Reset</button>
      </div>

      <div class="toggles">
        <label class="toggle-item">
          <input type="checkbox" id="soundToggle" checked />
          <span id="soundLabel">Sound on</span>
        </label>
        <label class="toggle-item">
          <input type="checkbox" id="vibrationToggle" checked />
          <span id="vibrationLabel">Vibration on</span>
        </label>
      </div>

      <div id="timerStatus" class="status">Ready</div>
    </section>

    <section id="pomodoroPanel" class="panel">
      <h2 id="pomodoroTitle">Pomodoro - Work</h2>
      <p id="pomodoroDesc" class="panel-text">Choose a focus preset and load it into timer.</p>

      <div class="quick-row">
        <button class="preset-btn" data-work="25" data-break="5" type="button">25 / 5</button>
        <button class="preset-btn" data-work="50" data-break="10" type="button">50 / 10</button>
        <button class="preset-btn" data-work="15" data-break="3" type="button">15 / 3</button>
        <button class="preset-btn" data-work="90" data-break="20" type="button">90 / 20</button>
      </div>

      <div class="inputs-grid two">
        <div class="field">
          <label id="workLabel" for="pomodoroWork">Work</label>
          <input id="pomodoroWork" type="number" min="1" value="25" />
        </div>
        <div class="field">
          <label id="breakLabel" for="pomodoroBreak">Break</label>
          <input id="pomodoroBreak" type="number" min="1" value="5" />
        </div>
      </div>

      <div class="controls single">
        <button id="applyPomodoroBtn" class="primary" type="button">Apply Pomodoro</button>
      </div>

      <div class="controls">
        <button id="pomodoroResetBtn" type="button">Reset Pomodoro</button>
        <button id="pomodoroCycleResetBtn" type="button">Reset Cycle</button>
        <button id="pomodoroSkipBtn" type="button">Next Phase</button>
      </div>

      <div id="pomodoroStatus" class="status">Ready</div>
    </section>

    <section id="stopwatchPanel" class="panel">
      <div class="display-wrap small">
        <div class="ring stopwatch-ring"></div>
        <div id="stopwatchDisplay" class="display stopwatch-display">00:00:00.0</div>
      </div>

      <div class="controls">
        <button id="swStartBtn" class="primary" type="button">Start</button>
        <button id="swLapBtn" type="button">Lap</button>
        <button id="swResetBtn" type="button">Reset</button>
      </div>

      <div class="controls single">
        <button id="swClearLapsBtn" type="button">Clear Laps</button>
      </div>

      <div id="stopwatchStatus" class="status">Ready</div>

      <div class="laps-box">
        <div id="lapsTitle" class="laps-title">Laps</div>
        <div id="lapsList" class="laps-list"></div>
      </div>
    </section>

    <section id="soundsPanel" class="panel">
      <h2 id="soundsTitle">Alarm sounds</h2>
      <p id="soundsDesc" class="panel-text">Select a sound and preview it.</p>

      <div class="controls single">
        <button id="previewSoundBtn" class="primary" type="button">Preview sound</button>
      </div>

      <div id="soundCountLabel" class="sound-count">60 sounds</div>
      <div id="soundList" class="sound-list"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <div id="alarmOverlay" class="alarm-overlay hidden">
    <div class="alarm-box">
      <div id="alarmTitle" class="alarm-title">Time is up!</div>
      <div id="alarmMessage" class="alarm-message">Alarm is ringing</div>
      <button id="dismissAlarmBtn" class="primary alarm-btn" type="button">Dismiss</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

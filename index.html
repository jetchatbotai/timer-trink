<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Trink!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand-group">
        <h1 class="brand">⏱ Timer Trink!</h1>
        <p id="subtitle" class="subtitle">Simple timer for focus and daily use</p>
      </div>

      <div class="top-actions">
        <select id="language">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="zh">中文</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
          <option value="ar">العربية</option>
          <option value="it">Italiano</option>
          <option value="pt">Português</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="hi">हिन्दी</option>
          <option value="fa">فارسی</option>
          <option value="uk">Українська</option>
          <option value="pl">Polski</option>
          <option value="nl">Nederlands</option>
          <option value="sv">Svenska</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="ms">Bahasa Melayu</option>
          <option value="vi">Tiếng Việt</option>
          <option value="el">Ελληνικά</option>
          <option value="cs">Čeština</option>
          <option value="ro">Română</option>
          <option value="hu">Magyar</option>
          <option value="bg">Български</option>
          <option value="sr">Srpski</option>
          <option value="hr">Hrvatski</option>
          <option value="sk">Slovenčina</option>
          <option value="sl">Slovenščina</option>
          <option value="da">Dansk</option>
          <option value="fi">Suomi</option>
          <option value="no">Norsk</option>
          <option value="lt">Lietuvių</option>
          <option value="lv">Latviešu</option>
          <option value="et">Eesti</option>
          <option value="he">עברית</option>
          <option value="th">ไทย</option>
          <option value="bn">বাংলা</option>
          <option value="ur">اردو</option>
          <option value="ta">தமிழ்</option>
          <option value="te">తెలుగు</option>
          <option value="ml">മലയാളം</option>
          <option value="mr">मराठी</option>
          <option value="gu">ગુજરાતી</option>
          <option value="pa">ਪੰਜਾਬੀ</option>
          <option value="sw">Kiswahili</option>
          <option value="am">አማርኛ</option>
          <option value="az">Azərbaycanca</option>
          <option value="kk">Қазақша</option>
        </select>

        <button id="themeToggle" class="icon-btn" type="button">🌙</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="timerPanel" id="tabTimer">Timer</button>
      <button class="tab-btn" data-tab="pomodoroPanel" id="tabPomodoro">Pomodoro</button>
      <button class="tab-btn" data-tab="soundsPanel" id="tabSounds">Sounds</button>
    </nav>

    <main>
      <section id="timerPanel" class="panel active">
        <div class="display-wrap">
          <div class="ring" id="ring"></div>
          <div id="display" class="display">00:00:00</div>
        </div>

        <div class="quick-row">
          <button class="chip quick-btn" data-h="0" data-m="1" data-s="0">1m</button>
          <button class="chip quick-btn" data-h="0" data-m="5" data-s="0">5m</button>
          <button class="chip quick-btn" data-h="0" data-m="10" data-s="0">10m</button>
          <button class="chip quick-btn" data-h="0" data-m="25" data-s="0">25m</button>
        </div>

        <div class="inputs-grid">
          <div class="field">
            <label id="hoursLabel" for="hours">Hours</label>
            <input id="hours" type="number" min="0" step="1" value="0">
          </div>
          <div class="field">
            <label id="minutesLabel" for="minutes">Minutes</label>
            <input id="minutes" type="number" min="0" step="1" value="0">
          </div>
          <div class="field">
            <label id="secondsLabel" for="seconds">Seconds</label>
            <input id="seconds" type="number" min="0" step="1" value="0">
          </div>
        </div>

        <div class="controls">
          <button id="startBtn" class="primary">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>

        <div class="toggles">
          <label class="toggle-item">
            <input type="checkbox" id="soundToggle" checked>
            <span id="soundLabel">Sound on</span>
          </label>
          <label class="toggle-item">
            <input type="checkbox" id="vibrationToggle" checked>
            <span id="vibrationLabel">Vibration on</span>
          </label>
        </div>

        <div id="status" class="status">Ready</div>
      </section>

      <section id="pomodoroPanel" class="panel">
        <h2 id="pomodoroTitle">Pomodoro</h2>
        <p id="pomodoroDesc" class="panel-text">Choose a focus preset and load it into timer.</p>

        <div class="preset-grid">
          <button class="preset-btn" data-work="25" data-break="5">25 / 5</button>
          <button class="preset-btn" data-work="50" data-break="10">50 / 10</button>
          <button class="preset-btn" data-work="15" data-break="3">15 / 3</button>
          <button class="preset-btn" data-work="90" data-break="20">90 / 20</button>
        </div>

        <div class="inputs-grid inputs-grid-2">
          <div class="field">
            <label id="workLabel" for="pomodoroWork">Work</label>
            <input id="pomodoroWork" type="number" min="1" step="1" value="25">
          </div>
          <div class="field">
            <label id="breakLabel" for="pomodoroBreak">Break</label>
            <input id="pomodoroBreak" type="number" min="1" step="1" value="5">
          </div>
        </div>

        <div class="controls single">
          <button id="applyPomodoroBtn" class="primary">Apply Pomodoro</button>
        </div>

        <div id="pomodoroStatus" class="status">Ready</div>
      </section>

      <section id="soundsPanel" class="panel">
        <h2 id="soundsTitle">Alarm sounds</h2>
        <p id="soundsDesc" class="panel-text">Select a sound and preview it.</p>

        <div class="sound-list">
          <label class="sound-item"><input type="radio" name="alarmSound" value="classic" checked> <span>Classic Bell</span></label>
          <label class="sound-item"><input type="radio" name="alarmSound" value="digital"> <span>Digital Beep</span></label>
          <label class="sound-item"><input type="radio" name="alarmSound" value="soft"> <span>Soft Tone</span></label>
          <label class="sound-item"><input type="radio" name="alarmSound" value="urgent"> <span>Urgent Alarm</span></label>
          <label class="sound-item"><input type="radio" name="alarmSound" value="zen"> <span>Zen Chime</span></label>
          <label class="sound-item"><input type="radio" name="alarmSound" value="retro"> <span>Retro Clock</span></label>
        </div>

        <div class="controls single">
          <button id="previewSoundBtn" class="primary">Preview sound</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timer Trink</title>

<style>
:root{
  --bg:#0b132b;
  --card:#1c2541;
  --text:#eaeaea;

  --primary:#7c3aed;
  --secondary:#06b6d4;
  --ring-rest:#1c2541;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0b132b,#1c2541);
  color:var(--text);
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab-btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  background:#24325a;
  text-align:center;
  cursor:pointer;
}

.tab-btn.active{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* PANELS */
.panel{
  display:none;
}

.panel.active{
  display:block;
}

/* TIMER RING */
.timer-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
}

.ring{
  width:280px;
  height:280px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.inner{
  width:220px;
  height:220px;
  border-radius:50%;
  background:#020617;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#timerDisplay{
  font-size:32px;
  font-weight:bold;
}

/* INPUTS */
.row{
  display:flex;
  gap:10px;
  margin-top:15px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#24325a;
  color:white;
}

/* BUTTONS */
button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#24325a;
  color:white;
}

button.primary{
  background:linear-gradient(90deg,var(--primary),var(--secondary));
}

/* STOPWATCH FIX */
#stopwatchPanel .row{
  margin-top:20px;
}

/* SOUND */
.sound-item{
  padding:12px;
  background:#24325a;
  border-radius:10px;
  margin-bottom:8px;
}

</style>
</head>

<body>

<div class="container">

<!-- TABS -->
<div class="tabs">
  <div class="tab-btn active" data-tab="timerPanel">Timer</div>
  <div class="tab-btn" data-tab="pomodoroPanel">Pomodoro</div>
  <div class="tab-btn" data-tab="stopwatchPanel">Kronometre</div>
  <div class="tab-btn" data-tab="soundPanel">Ses</div>
</div>

<!-- TIMER -->
<div id="timerPanel" class="panel active">

  <div class="timer-wrapper">
    <div id="timerRing" class="ring">
      <div class="inner">
        <div id="timerDisplay">00:00:00</div>
        <div id="timerStatus">Hazır</div>
      </div>
    </div>
  </div>

  <div class="row">
    <input id="hours" placeholder="Saat">
    <input id="minutes" placeholder="Dakika">
    <input id="seconds" placeholder="Saniye">
  </div>

  <div class="row">
    <button id="timerStartBtn" class="primary">Başlat</button>
    <button id="timerPauseBtn">Duraklat</button>
    <button id="timerResetBtn">Sıfırla</button>
  </div>

</div>

<!-- POMODORO -->
<div id="pomodoroPanel" class="panel">
  <h2>Pomodoro</h2>

  <div class="row">
    <input id="pomodoroWork" value="25">
    <input id="pomodoroBreak" value="5">
  </div>

  <div class="row">
    <button id="applyPomodoroBtn" class="primary">Başlat</button>
  </div>

  <div id="pomodoroStatus">Hazır</div>
</div>

<!-- STOPWATCH -->
<div id="stopwatchPanel" class="panel">

  <div class="timer-wrapper">
    <div class="ring">
      <div class="inner">
        <div id="stopwatchDisplay">00:00:00.0</div>
      </div>
    </div>
  </div>

  <div class="row">
    <button id="swStartBtn" class="primary">Başlat</button>
    <button id="swLapBtn">Tur</button>
    <button id="swResetBtn">Sıfırla</button>
  </div>

  <div class="row">
    <button id="swClearLapsBtn">Turları temizle</button>
  </div>

  <div id="lapsList"></div>
</div>

<!-- SOUND -->
<div id="soundPanel" class="panel">
  <h2>Alarm sesleri</h2>
  <button id="previewSoundBtn" class="primary">Sesi dinle</button>
  <div id="soundList"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>

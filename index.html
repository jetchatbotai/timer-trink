<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Trink!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="card">
      <div class="topbar">
        <h1>⏱ Timer Trink!</h1>

        <div class="top-actions">
          <select id="language" aria-label="Language">
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
          </select>

          <button id="themeToggle" class="icon-btn" type="button">🌙</button>
        </div>
      </div>

      <p id="subtitle" class="subtitle">Basit, hızlı ve çok dilli zamanlayıcı</p>

      <div class="timer-ring">
        <div class="ring"></div>
        <div id="display" class="display">00:00</div>
      </div>

      <div class="quick-times">
        <button class="quick-btn" data-minutes="1">1m</button>
        <button class="quick-btn" data-minutes="5">5m</button>
        <button class="quick-btn" data-minutes="10">10m</button>
        <button class="quick-btn" data-minutes="25">25m</button>
      </div>

      <div class="input-wrap">
        <input
          type="number"
          id="minutes"
          min="1"
          step="1"
          placeholder="Dakika"
          inputmode="numeric"
        />
      </div>

      <div class="buttons">
        <button id="startBtn" class="primary" type="button">Başlat</button>
        <button id="pauseBtn" type="button">Duraklat</button>
        <button id="resetBtn" type="button">Sıfırla</button>
      </div>

      <div class="options">
        <label class="switch-row">
          <input type="checkbox" id="soundToggle" checked />
          <span id="soundLabel">Ses açık</span>
        </label>

        <label class="switch-row">
          <input type="checkbox" id="vibrationToggle" checked />
          <span id="vibrationLabel">Titreşim açık</span>
        </label>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
